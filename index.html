<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist & Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.firebasestorage.app",
  messagingSenderId: "821194575297",
  appId: "1:821194575297:web:185b7837e6cdee4783f340",
  measurementId: "G-RHE1QBW9WX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wishlistRef = ref(db, 'gifts');
        const foodRef = ref(db, 'foods');

        let base64Image = "";

        window.switchTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabName).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('text-pink-400', 'border-t-2', 'border-pink-400', 'text-orange-400', 'border-orange-400'));
            const btn = event.currentTarget;
            if(tabName === 'wishlistTab') btn.classList.add('text-pink-400', 'border-t-2', 'border-pink-400');
            else btn.classList.add('text-orange-400', 'border-t-2', 'border-orange-400');
        };

        window.handleFileSelect = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('previewContainer').innerHTML = `<img src="${base64Image}" class="w-full h-32 object-cover rounded-2xl border border-orange-500/50">`;
                };
                reader.readAsDataURL(file);
            }
        };

        window.addFood = () => {
            const name = document.getElementById('foodName').value;
            const note = document.getElementById('foodNote').value;
            if(!name) return;
            
            push(foodRef, { 
                name, 
                image: base64Image, 
                note, 
                priority: foodP, 
                status: 'pending', 
                createdAt: Date.now() 
            });
            
            document.getElementById('foodName').value = "";
            document.getElementById('foodNote').value = "";
            document.getElementById('foodFile').value = "";
            document.getElementById('previewContainer').innerHTML = "";
            base64Image = ""; 
        };

        onValue(foodRef, (s) => {
            const container = document.getElementById('foodContainer');
            container.innerHTML = "";
            const data = s.val();
            if(data) {
                const items = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.createdAt - a.createdAt);
                items.forEach(item => {
                    const isD = item.status === 'done';
                    container.insertAdjacentHTML('beforeend', `
                        <div class="p-6 mb-4 rounded-[2.5rem] border border-zinc-800 bg-[#0d0d0d] ${isD ? 'opacity-30' : ''}">
                            <div class="flex items-start gap-4">
                                ${item.image ? `<img src="${item.image}" class="w-20 h-20 rounded-2xl object-cover border border-zinc-800 shadow-xl">` : ''}
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg text-orange-100 italic">😋 ${item.name}</h3>
                                    ${item.note ? `<p class="text-[11px] text-zinc-500 mt-1 italic">"${item.note}"</p>` : ''}
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button onclick="updateFoodStatus('${item.id}', '${isD?'pending':'done'}')" class="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center">${isD?'🔄':'✅'}</button>
                                    <button onclick="deleteFood('${item.id}')" class="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center">🗑️</button>
                                </div>
                            </div>
                        </div>`);
                });
            }
        });
        window.updateFoodStatus = (id, status) => update(ref(db, `foods/${id}`), { status });
        window.deleteFood = (id) => { if(confirm("Xoá món này?")) remove(ref(db, `foods/${id}`)); };
        
        let foodP = 1;
        window.selectFoodPriority = (v) => {
            foodP = v;
            document.querySelectorAll('.food-p-btn').forEach(b => b.classList.remove('active-food-p'));
            document.getElementById('food-p-'+v).classList.add('active-food-p');
        };
    </script>

    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-main { background: #0b0b0b; border: 1px solid #1a1a1a; border-radius: 2.5rem; }
        input, textarea { background-color: #121212 !important; border: 1px solid #222 !important; color: white !important; outline: none; }
        .bottom-nav { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border-top: 1px solid #1a1a1a; }
        .active-food-p { border-color: #f97316; color: #f97316; background: rgba(249, 115, 22, 0.1); }
        .food-p-btn { background: #121212; border: 1px solid #222; color: #555; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body class="pb-28 flex justify-center">
    <div class="w-full max-w-md">

        <div id="wishlistTab" class="tab-content p-4">
            <div class="text-center my-10"><h1 class="text-xl font-black italic text-pink-200 tracking-tighter uppercase">Wishlist Gifts 💎</h1></div>
            <div id="wishlistContainer"></div>
        </div>

        <div id="foodTab" class="tab-content hidden p-4">
            <div class="text-center my-10"><h1 class="text-xl font-black italic text-orange-300 tracking-tighter uppercase">Thèm Gì Ăn Nấy 🍗</h1></div>
            <div class="card-main p-8 mb-12 shadow-2xl border-t border-orange-900/20">
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-black text-zinc-600 uppercase italic ml-1">🍕 Tên món ăn</label>
                        <input type="text" id="foodName" placeholder="..." class="w-full p-4 rounded-2xl mt-2 text-sm">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-zinc-600 uppercase italic ml-1 block mb-3">📸 Tải ảnh từ điện thoại</label>
                        <div id="previewContainer" class="mb-3"></div>
                        <label class="flex items-center justify-center w-full p-4 rounded-2xl bg-zinc-900 border border-dashed border-zinc-700 text-zinc-500 text-sm cursor-pointer active:scale-95 transition-all">
                            <i class="fas fa-camera mr-2"></i> Chọn hoặc Chụp ảnh
                            <input type="file" id="foodFile" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        </label>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-zinc-600 uppercase italic ml-1 block mb-3">🔥 Độ thèm</label>
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="selectFoodPriority(1)" id="food-p-1" class="food-p-btn active-food-p p-3 rounded-xl">🍿</button>
                            <button onclick="selectFoodPriority(2)" id="food-p-2" class="food-p-btn p-3 rounded-xl">🥤</button>
                            <button onclick="selectFoodPriority(3)" id="food-p-3" class="food-p-btn p-3 rounded-xl">🍕</button>
                            <button onclick="selectFoodPriority(4)" id="food-p-4" class="food-p-btn p-3 rounded-xl">🔥</button>
                        </div>
                    </div>

                    <button onclick="addFood()" class="w-full py-5 bg-orange-600 text-white rounded-[2.5rem] font-black text-xs tracking-widest shadow-xl uppercase active:scale-95">🛎️ BẮN TÍN HIỆU</button>
                </div>
            </div>
            <div id="foodContainer"></div>
        </div>

        <div class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center px-6 z-50">
            <button onclick="switchTab('wishlistTab')" class="tab-btn flex flex-col items-center gap-1 text-pink-400 border-t-2 border-pink-400 pt-2"><i class="fas fa-gift text-lg"></i><span class="text-[10px] font-bold uppercase">Wishlist</span></button>
            <button onclick="switchTab('foodTab')" class="tab-btn flex flex-col items-center gap-1 text-zinc-500 pt-2"><i class="fas fa-utensils text-lg"></i><span class="text-[10px] font-bold uppercase">Ăn uống</span></button>
        </div>
    </div>
</body>
</html>
