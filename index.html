<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist Realtime</title>

<style>
body{
  font-family: Arial;
  background:#fff0f5;
  padding:20px;
}

.container{max-width:500px;margin:auto}

h2{text-align:center}

input,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  background:#ff69b4;
  color:white;
  font-weight:bold;
  border:none;
}

.tag{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ccc;
  display:inline-block;
  margin:5px;
  cursor:pointer;
}

.tag.active{
  background:#ff69b4;
  color:white;
}

.item{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
}
.priority{opacity:0.7;font-size:13px}
</style>
</head>

<body>

<div class="container">

<h2>💗 Wishlist Realtime</h2>

<input id="name" placeholder="Nhập món muốn thêm...">

<div>
  <span class="tag">💭 Đang fomo</span>
  <span class="tag">🌷 Thích nha</span>
  <span class="tag">🥺 Muốn lắm lắm</span>
  <span class="tag">💗 Cần rồi</span>
  <span class="tag">🔥 Phải có</span>
</div>

<button onclick="addItem()">Thêm</button>

<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "demo",
  authDomain: "wishlist-c5669.firebaseapp.com",
  databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wishlist-c5669",
  storageBucket: "wishlist-c5669.appspot.com",
  messagingSenderId: "demo",
  appId: "demo"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selected = "";

document.querySelectorAll('.tag').forEach(t=>{
  t.onclick = () => {
    document.querySelectorAll('.tag').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    selected = t.innerText;

    if(navigator.vibrate) navigator.vibrate(30);
  }
});

function addItem(){
  const name = document.getElementById("name").value;
  if(!name || !selected) return;

  db.ref("wishlist").push({
    name,
    priority: selected
  });

  document.getElementById("name").value = "";
}

db.ref("wishlist").on("value", (snap)=>{
  const data = snap.val();
  const list = document.getElementById("list");

  list.innerHTML = "";

  for(let id in data){
    const item = data[id];

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div>${item.name}</div>
      <div class="priority">${item.priority}</div>
    `;

    list.appendChild(div);
  }
});
</script>

</body>
</html>
