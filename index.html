<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist của Bòi Bói Boi🫃🏻</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;600&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#2b0b12,#000);
  color:white;
}

.header{
  padding:20px;
  font-family:'Playfair Display';
  font-size:22px;
  color:#ff6b9d;
}

.sub{
  text-align:center;
  font-family:'Dancing Script',cursive;
  font-size:18px;
  color:#ff9db8;
  margin-top:-10px;
}

.container{
  max-width:520px;
  margin:auto;
  padding:15px;
}

.card{
  background:#111;
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 0 25px rgba(255,0,80,0.15);
}

input,textarea,select{
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#1c1c1c;
  color:white;
}

/* PRIORITY */
.priority{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}

.priority div{
  padding:8px 10px;
  border-radius:10px;
  background:#222;
  font-size:12px;
  cursor:pointer;
}

.activeP{
  background:#ff4f87;
}

/* BUTTON */
button{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff4f87,#ff8fb1);
  color:white;
  font-weight:600;
}

/* ITEM */
.item{
  background:#111;
  border-radius:18px;
  padding:12px;
  margin-top:10px;
}

.title{
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#aaa;
}

.priority-tag{
  font-size:12px;
  margin-top:4px;
  color:#ff9db8;
}

.actions{
  display:flex;
  gap:6px;
  margin-top:8px;
}

.actions button{
  flex:1;
  font-size:12px;
  background:#222;
}

.buy{
  background:#ff4f87 !important;
}

.done{
  opacity:0.5;
  text-decoration:line-through;
}
</style>
</head>

<body>

<div class="header">🌹 Wishlist của Bòi Bói Boi🫃🏻</div>
<div class="sub">Thêm món quà anh thích vào đây nhoéeee 💌</div>

<div class="container">

<!-- FORM -->
<div class="card">

<input id="name" placeholder="🎁 Tên quà...">
<input id="price" placeholder="💰 Giá...">
<input id="link" placeholder="🔗 Link sản phẩm...">

<select id="category">
<option>💖 Lãng mạn</option>
<option>👕 Thời trang</option>
<option>💻 Công nghệ</option>
</select>

<textarea id="note" placeholder="💬 Ghi chú..."></textarea>

<div class="priority" id="priorityBox">
  <div data="💭 Đang fomo">💭 Đang fomo</div>
  <div data="🌷 Thích nha">🌷 Thích nha</div>
  <div data="🥺 Muốn lắm lắm">🥺 Muốn lắm lắm</div>
  <div data="💗 Cần rồi">💗 Cần rồi</div>
  <div data="🔥 Phải có">🔥 Phải có</div>
</div>

<button id="addBtn">➕ Thêm vào wishlist</button>

</div>

<!-- LIST -->
<div class="card">
<h3>📋 Wishlist</h3>
<div id="list"></div>
</div>

</div>

<script>
let items = JSON.parse(localStorage.getItem("wishlist")) || [];
let priority = "💭 Đang fomo";

const listEl = document.getElementById("list");

/* PRIORITY CLICK */
document.querySelectorAll("#priorityBox div").forEach(el=>{
  el.onclick = function(){
    priority = this.getAttribute("data");
    document.querySelectorAll("#priorityBox div").forEach(x=>x.classList.remove("activeP"));
    this.classList.add("activeP");
  }
});

function save(){
  localStorage.setItem("wishlist", JSON.stringify(items));
}

function render(){
  listEl.innerHTML = "";

  items.forEach((item,i)=>{
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="${item.done?'done':''}">
        <div class="title">${item.name}</div>
        <div class="meta">${item.price} • ${item.category}</div>
        <div class="priority-tag">${item.priority}</div>
        <div class="meta">${item.note || ""}</div>
      </div>

      <div class="actions">
        <button class="buy" onclick="openLink('${item.link}')">🛒</button>
        <button onclick="toggle(${i})">✔️</button>
        <button onclick="del(${i})">❌</button>
      </div>
    `;

    listEl.appendChild(div);
  });
}

document.getElementById("addBtn").onclick = function(){
  let name = document.getElementById("name").value;
  if(!name) return alert("Nhập tên 😾");

  items.push({
    name,
    price:document.getElementById("price").value,
    link:document.getElementById("link").value,
    category:document.getElementById("category").value,
    note:document.getElementById("note").value,
    priority,
    done:false
  });

  save();
  render();

  ["name","price","link","note"].forEach(id=>document.getElementById(id).value="");
}

function del(i){
  items.splice(i,1);
  save();
  render();
}

function toggle(i){
  items[i].done=!items[i].done;
  save();
  render();
}

function openLink(link){
  if(link) window.open(link);
}

render();
</script>

</body>
</html>
