<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wishlist của Bòi Bói Boi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select, textarea { background-color: #121212 !important; border: 1px solid #222 !important; color: white !important; outline: none; }
        .card-main { background: #0b0b0b; border: 1px solid #1a1a1a; border-radius: 2.5rem; }
        .priority-btn { background: #121212; border: 1px solid #222; transition: 0.3s; color: #666; font-size: 11px; font-weight: bold; }
        .active-priority { background: rgba(244, 114, 182, 0.15); border-color: #f472b6 !important; color: #f472b6 !important; }
        .active-food-priority { background: rgba(245, 158, 11, 0.15); border-color: #f59e0b !important; color: #f59e0b !important; }
        .gift-box { position: fixed; font-size: 35px; pointer-events: none; z-index: 9999; }
        .hidden { display: none !important; }
        #roleOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .role-card { background: #1a1a1a; padding: 40px 20px; border-radius: 40px; border: 1px solid #333; text-align: center; width: 85%; max-width: 400px; }
        .role-btn { width: 100%; padding: 20px; margin: 12px 0; border-radius: 20px; font-weight: 800; font-size: 18px; }
    </style>
</head>
<body class="flex justify-center min-h-screen p-4 pb-24">
    <div id="roleOverlay" class="hidden">
        <div class="role-card">
            <h2 style="color:white; margin-bottom: 30px; font-size: 24px;">Bạn là ai thế? 🧐</h2>
            <button class="role-btn bg-pink-600" onclick="setRole('em')">LÀ EM (Công Chúa)</button>
            <button class="role-btn bg-blue-500" onclick="setRole('anh')">LÀ ANH (Bòi Bói Boi)</button>
        </div>
    </div>
    <div class="w-full max-w-md">
        <div class="flex justify-center gap-3 mb-8">
            <button id="btn-tab-gift" onclick="switchTab('gifts')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] tracking-widest uppercase bg-pink-600 text-white shadow-lg">🎁 Wishlist</button>
            <button id="btn-tab-food" onclick="switchTab('foods')" class="flex-1 py-4 rounded-[2rem] font-black text-[10px] tracking-widest uppercase bg-zinc-900 text-zinc-500 shadow-lg">🍜 Foodlist</button>
        </div>
        <div id="tab-gifts">
            <div class="text-center my-12"><h1 class="text-2xl font-black italic text-pink-200 tracking-tighter">Wishlist của Bòi Bói Boi🫃🏻</h1></div>
            <div class="card-main p-8 mb-16">
                <div class="space-y-6">
                    <input type="text" id="giftName" placeholder="Tên món quà..." class="w-full p-4.5 rounded-2xl">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="category" class="w-full p-4.5 rounded-2xl appearance-none">
                            <option value="💕 Lãng Mạn">💕 Lãng Mạn</option>
                            <option value="🎮 Công Nghệ">🎮 Công Nghệ</option>
                            <option value="👕 Thời Trang">👕 Thời Trang</option>
                        </select>
                        <input type="text" id="giftPrice" placeholder="Giá..." class="w-full p-4.5 rounded-2xl font-bold">
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="selectPriority(1)" id="priority-1" class="priority-btn gift-priority-btn p-3 rounded-xl active-priority">💬 FOMO</button>
                        <button onclick="selectPriority(2)" id="priority-2" class="priority-btn gift-priority-btn p-3 rounded-xl">🌷 Thích nha</button>
                        <button onclick="selectPriority(3)" id="priority-3" class="priority-btn gift-priority-btn p-3 rounded-xl">🙄 Muốn lắm</button>
                        <button onclick="selectPriority(4)" id="priority-4" class="priority-btn gift-priority-btn p-3 rounded-xl">💕 Cần rồi</button>
                        <button onclick="selectPriority(5)" id="priority-5" class="priority-btn gift-priority-btn p-3 rounded-xl text-red-500">🔥 PHẢI CÓ</button>
                    </div>
                    <textarea id="giftNote" placeholder="Ghi chú..." class="w-full p-4.5 rounded-2xl h-24 resize-none"></textarea>
                    <button onclick="addGift()" class="w-full py-5 bg-pink-600 text-white rounded-[2.5rem] font-black uppercase">🚀 THÊM QUÀ 💖</button>
                </div>
            </div>
            <div id="wishlistContainer" class="space-y-5"></div>
        </div>
        <div id="tab-foods" class="hidden">
            <div class="text-center my-12"><h1 class="text-2xl font-black italic text-orange-200 tracking-tighter">Foodlist Toàn Món Ngon🤤</h1></div>
            <div class="card-main p-8 mb-16">
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <input type="text" id="foodName" placeholder="Tên món..." class="flex-1 p-4.5 rounded-2xl">
                        <label class="w-20 h-[52px] bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-center cursor-pointer overflow-hidden relative">
                            <i id="cameraIcon" class="fas fa-camera text-zinc-500"></i>
                            <img id="previewImg" class="w-full h-full object-cover hidden">
                            <input type="file" accept="image/*" onchange="handleImageUpload(event)" class="hidden">
                        </label>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="foodCategory" class="w-full p-4.5 rounded-2xl appearance-none">
                            <option value="🥘 Món chính">🥘 Món chính</option>
                            <option value="🍦 Đồ ngọt">🍦 Đồ ngọt</option>
                        </select>
                        <input type="text" id="foodPrice" placeholder="Giá..." class="w-full p-4.5 rounded-2xl font-bold">
                    </div>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="selectFoodPriority(1)" id="food-priority-1" class="priority-btn food-priority-btn p-3 rounded-xl active-food-priority">🍜 Thử thôi</button>
                        <button onclick="selectFoodPriority(2)" id="food-priority-2" class="priority-btn food-priority-btn p-3 rounded-xl">🍕 Khá thèm</button>
                        <button onclick="selectFoodPriority(3)" id="food-priority-3" class="priority-btn food-priority-btn p-3 rounded-xl">🍔 Rất đói</button>
                        <button onclick="selectFoodPriority(4)" id="food-priority-4" class="priority-btn food-priority-btn p-3 rounded-xl">🍣 Ghiền quá</button>
                        <button onclick="selectFoodPriority(5)" id="food-priority-5" class="priority-btn food-priority-btn p-3 rounded-xl text-orange-500">🔥 THÈM CHẾT MẤT</button>
                    </div>
                    <button onclick="addFood()" class="w-full py-5 bg-orange-500 text-white rounded-[2.5rem] font-black uppercase">🛒 CHỐT ĐƠN 🤪</button>
                </div>
            </div>
            <div id="foodListContainer" class="space-y-5"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const password = prompt("Nhập mật khẩu:");
        if (password !== "congchuabuombuom") { alert("Sai rồi bưởi!"); window.location.href = "about:blank"; }

        const firebaseConfig = {
            apiKey: "AIzaSyAiOpChueDkBODGKessbTvHDS-YOxeSsHE",
            authDomain: "wishlist-c5669.firebaseapp.com",
            databaseURL: "https://wishlist-c5669-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wishlist-c5669",
            storageBucket: "wishlist-c5669.firebasestorage.app",
            messagingSenderId: "821194575297",
            appId: "1:821194575297:web:185b7837e6cdee4783f340",
            measurementId: "G-RHE1QBW9WX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        if (!localStorage.getItem('userRole')) { document.getElementById('roleOverlay').classList.remove('hidden'); }
        window.setRole = (role) => { localStorage.setItem('userRole', role); location.reload(); };
        const currentUser = localStorage.getItem('userRole');

        // Logic Badge theo yêu cầu cụ thể:
        // Em chỉ nhận badge khi Anh add Quà. Anh chỉ nhận badge khi Em add Đồ ăn.
        const badgeRef = ref(db, currentUser === 'em' ? 'badgeForWish' : 'badgeForFood');
        onValue(badgeRef, (s) => {
            const count = s.val() || 0;
            if ('setAppBadge' in navigator) { count > 0 ? navigator.setAppBadge(count) : navigator.clearAppBadge(); }
        });

        const notifyPartner = async (type) => {
            let targetNode = "";
            // Nếu Anh (role='anh') add Quà (type='wish') -> Thông báo cho Em qua node badgeForWish
            if (currentUser === 'anh' && type === 'wish') targetNode = 'badgeForWish';
            // Nếu Em (role='em') add Đồ ăn (type='food') -> Thông báo cho Anh qua node badgeForFood
            if (currentUser === 'em' && type === 'food') targetNode = 'badgeForFood';

            if (targetNode) {
                const r = ref(db, targetNode);
                const s = await get(r);
                set(r, (s.val() || 0) + 1);
            }
        };

        const wishlistRef = ref(db, 'gifts'), foodRef = ref(db, 'foods');
        let selPrio = 1, foodPrio = 1, imgB64 = "";

        const burst = () => {
            const icons = ['🎁', '💃', '✨', '💖', '💍', '🧸', '🍜', '🍕', '🍣', '🍔'];
            for (let i = 0; i < 20; i++) {
                const b = document.createElement('div');
                b.className = 'gift-box'; b.innerText = icons[Math.floor(Math.random()*icons.length)];
                b.style.left = '50%'; b.style.top = '50%'; document.body.appendChild(b);
                anime({ targets: b, translateX: () => anime.random(-300, 300), translateY: () => anime.random(-600, 100), rotate: () => anime.random(-360, 360), opacity: [1, 0], scale: [0, 2, 0.5], duration: 2000, easing: 'easeOutExpo', complete: () => b.remove() });
            }
        };

        const scroll = (id, isFood) => {
            burst();
            setTimeout(() => {
                const el = document.getElementById(`item-${id}`);
                if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.boxShadow = isFood ? "0 0 30px #f59e0b" : "0 0 30px #f472b6"; setTimeout(() => el.style.boxShadow = "none", 2000); }
            }, 500);
        };

        window.addGift = () => {
            const n = document.getElementById('giftName').value, p = document.getElementById('giftPrice').value;
            if(!n || !p) return alert("Nhập đủ tên và giá!");
            const res = push(wishlistRef, { name: n, price: p, category: document.getElementById('category').value, note: document.getElementById('giftNote').value, priority: selPrio, status: 'pending', createdAt: Date.now() });
            notifyPartner('wish');
            document.getElementById('giftName').value = ""; document.getElementById('giftPrice').value = ""; scroll(res.key, false);
        };

        window.addFood = () => {
            const n = document.getElementById('foodName').value, p = document.getElementById('foodPrice').value;
            if(!n || !p) return alert("Nhập đủ món và giá!");
            const res = push(foodRef, { name: n, price: p, category: document.getElementById('foodCategory').value, image: imgB64, priority: foodPrio, status: 'pending', createdAt: Date.now() });
            notifyPartner('food');
            document.getElementById('foodName').value = ""; document.getElementById('foodPrice').value = ""; imgB64 = ""; scroll(res.key, true);
        };

        const render = (r, cId, lbls, sFn, dFn, isF) => {
            onValue(r, (snap) => {
                const cont = document.getElementById(cId); cont.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => b.priority - a.priority || b.createdAt - a.createdAt).forEach(item => {
                        const isB = item.status === 'bought';
                        const styles = isF ? ["", "bg-zinc-600", "bg-emerald-500", "bg-amber-500", "bg-orange-500", "bg-red-600"] : ["", "bg-zinc-600", "bg-emerald-500", "bg-pink-400", "bg-pink-600", "bg-red-600"];
                        cont.insertAdjacentHTML('beforeend', `<div id="item-${item.id}" class="p-6 mb-5 rounded-[2.5rem] border border-zinc-800 bg-[#0d0d0d] ${isB ? 'opacity-30 grayscale' : ''}"><div class="flex justify-between items-start"><div class="flex-1 pr-3"><span class="text-[9px] px-2.5 py-1 rounded-full font-black uppercase text-white ${styles[item.priority]}">${lbls[item.priority]}</span><h3 class="font-bold text-xl mt-3 ${isB ? 'line-through' : ''}">${item.name}</h3><p class="text-[11px] text-zinc-500 font-bold mt-1">${item.price}đ • ${item.category}</p>${item.image ? `<img src="${item.image}" class="mt-4 rounded-3xl w-full h-48 object-cover border border-zinc-800">` : ''}</div><div class="flex flex-col gap-4"><button onclick="${sFn}('${item.id}', '${isB ? 'pending' : 'bought'}')" class="w-14 h-14 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-center text-2xl">${isF ? '🤤' : '💃'}</button><button onclick="${dFn}('${item.id}')" class="w-14 h-14 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-center text-2xl">🗑️</button></div></div></div>`);
                    });
                }
            });
        };

        render(wishlistRef, 'wishlistContainer', ["", "💬 FOMO", "🌷 Thích nha", "🙄 Muốn lắm", "💕 Cần rồi", "🔥 PHẢI CÓ"], 'updS', 'delI', false);
        render(foodRef, 'foodListContainer', ["", "🍜 Thử thôi", "🍕 Khá thèm", "🍔 Rất đói", "🍣 Ghiền quá", "🔥 CHẾT MẤT"], 'updFS', 'delFI', true);

        window.delI = (id) => confirm("Xoá quà?") && remove(ref(db, `gifts/${id}`));
        window.updS = (id, s) => update(ref(db, `gifts/${id}`), {status: s});
        window.delFI = (id) => confirm("Xoá món?") && remove(ref(db, `foods/${id}`));
        window.updFS = (id, s) => update(ref(db, `foods/${id}`), {status: s});
        window.selectPriority = (v) => { selPrio = v; document.querySelectorAll('.gift-priority-btn').forEach(b => b.classList.remove('active-priority')); document.getElementById('priority-' + v).classList.add('active-priority'); };
        window.selectFoodPriority = (v) => { foodPrio = v; document.querySelectorAll('.food-priority-btn').forEach(b => b.classList.remove('active-food-priority')); document.getElementById('food-priority-' + v).classList.add('active-food-priority'); };
        window.handleImageUpload = (e) => { const f = e.target.files[0]; if(f){ const r = new FileReader(); r.onload = (ev) => { imgB64 = ev.target.result; document.getElementById('previewImg').src = imgB64; document.getElementById('previewImg').classList.remove('hidden'); document.getElementById('cameraIcon').classList.add('hidden'); }; r.readAsDataURL(f); } };
        
        window.switchTab = (tab) => {
            const g = document.getElementById('tab-gifts'), f = document.getElementById('tab-foods'), bg = document.getElementById('btn-tab-gift'), bf = document.getElementById('btn-tab-food');
            if(tab === 'gifts') { 
                g.classList.remove('hidden'); f.classList.add('hidden'); 
                bg.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase bg-pink-600 text-white shadow-lg"; 
                bf.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase bg-zinc-900 text-zinc-500"; 
                if(currentUser === 'em') set(ref(db, 'badgeForWish'), 0); // Em vào xem quà thì reset badge quà của mình
            }
            else { 
                g.classList.add('hidden'); f.classList.remove('hidden'); 
                bf.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase bg-orange-500 text-white shadow-lg"; 
                bg.className = "flex-1 py-4 rounded-[2rem] font-black text-[10px] uppercase bg-zinc-900 text-zinc-500"; 
                if(currentUser === 'anh') set(ref(db, 'badgeForFood'), 0); // Anh vào xem đồ ăn thì reset badge đồ ăn của mình
            }
        };
        const fM = (id) => { const el = document.getElementById(id); if(el) el.addEventListener('input', (e) => { let v = e.target.value.replace(/\D/g, ""); e.target.value = new Intl.NumberFormat('en-US').format(v); }); };
        fM('giftPrice'); fM('foodPrice');
    </script>
</body>
</html>
