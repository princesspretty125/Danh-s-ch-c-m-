<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Wishlist mèo 🐱💖</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #ffe6f0, #e6f7ff);
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #ffffffdd;
  padding: 20px;
  border-radius: 25px;
}

h1 { text-align: center; color: #ff6fa5; }

input, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 12px;
  border: none;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #ff8fb1;
  color: white;
}

.item {
  background: #fff5f8;
  margin-top: 12px;
  padding: 12px;
  border-radius: 15px;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 5px;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}
</style>
</head>

<body>
<div class="container">
  <h1>🐱 Wishlist cho anh 💕</h1>

  <input id="name" placeholder="Tên quà..." />
  <input id="image" placeholder="Link ảnh (optional)" />
  <input id="link" placeholder="Link sản phẩm..." />
  <textarea id="note" placeholder="Ghi chú..."></textarea>

  <button onclick="addItem()">➕ Thêm</button>

  <div id="list"></div>
</div>

<script>
let items = JSON.parse(localStorage.getItem("wishlist_cat")) || [];

function save() {
  localStorage.setItem("wishlist_cat", JSON.stringify(items));
}

function render() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, i) => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="${item.done ? 'done' : ''}">
        <strong>${item.name}</strong>
        <div>${item.note}</div>
        ${item.image ? `<img src="${item.image}">` : ""}
        ${item.link ? `<a href="${item.link}" target="_blank">🔗 Xem</a>` : ""}
      </div>
      <button onclick="toggle(${i})">✔️ Đã mua</button>
      <button onclick="del(${i})">❌ Xoá</button>
    `;

    list.appendChild(div);
  });
}

function addItem() {
  let name = document.getElementById("name").value;
  let image = document.getElementById("image").value;
  let link = document.getElementById("link").value;
  let note = document.getElementById("note").value;

  if (!name) return alert("Nhập quà 😾");

  items.push({ name, image, link, note, done: false });
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("image").value = "";
  document.getElementById("link").value = "";
  document.getElementById("note").value = "";
}

function del(i) {
  items.splice(i,1);
  save();
  render();
}

function toggle(i) {
  items[i].done = !items[i].done;
  save();
  render();
}

render();
</script>
</body>
</html>
